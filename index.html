<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>げんのてっきゅうでバカーン</title>
<style>
  :root {
    --bg1: #f7c63d;
    --bg2: #5d6770;
    --card: #f4efe3;
    --ink: #2d2a24;
    --muted: #6b6254;
    --pink: #f6c443;
    --blue: #5eb7d7;
    --purple: #7e8790;
    --yellow: #ffd84a;
    --green: #79bd52;
    --red: #ef5b45;
    --stripe: #25231f;
    --shadow: 0 16px 0 rgba(38, 35, 29, 0.22), 0 24px 38px rgba(38, 35, 29, 0.24);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    color: var(--ink);
    background:
      linear-gradient(135deg, rgba(37,35,31,0.12) 25%, transparent 25%) 0 0 / 34px 34px,
      linear-gradient(225deg, rgba(37,35,31,0.10) 25%, transparent 25%) 0 0 / 34px 34px,
      radial-gradient(circle at 12% 12%, rgba(255, 236, 132, 0.95), transparent 22%),
      radial-gradient(circle at 88% 8%, rgba(122, 138, 148, 0.35), transparent 24%),
      linear-gradient(135deg, #f4b72f 0 46%, #6d7478 46% 100%);
    padding: 16px;
    overflow-x: hidden;
  }

  .app {
    width: min(980px, 100%);
    margin: 0 auto;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 900;
    font-size: clamp(24px, 5vw, 40px);
    letter-spacing: 0.03em;
    color: #1f1d19;
    text-shadow: 0 2px 0 rgba(255,255,255,0.28);
  }

  .badge {
    background: #ffd84a;
    border: 3px solid #25231f;
    border-radius: 999px;
    padding: 8px 12px;
    font-weight: 800;
    color: #25231f;
    box-shadow: 0 6px 0 rgba(37,35,31,0.22);
    white-space: nowrap;
  }

  .card {
    background:
      radial-gradient(circle at 12% 16%, rgba(255,255,255,0.35) 0 2px, transparent 3px),
      radial-gradient(circle at 84% 24%, rgba(37,35,31,0.08) 0 2px, transparent 3px),
      linear-gradient(#f7f1e2, #e5dcc8);
    border: 5px solid #25231f;
    border-radius: 18px;
    padding: clamp(16px, 3.5vw, 28px);
    box-shadow: var(--shadow);
    backdrop-filter: none;
  }

  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    align-items: center;
  }

  .title-stage {
    position: relative;
    overflow: hidden;
    min-height: min(720px, calc(100vh - 92px));
    border: 6px solid #25231f;
    border-radius: 18px;
    background:
      linear-gradient(135deg, rgba(37,35,31,0.16) 25%, transparent 25%, transparent 50%, rgba(37,35,31,0.16) 50%, rgba(37,35,31,0.16) 75%, transparent 75%) 0 0 / 46px 46px,
      linear-gradient(#f6bf35 0 64%, #806349 64% 75%, #737a7f 75% 100%);
    box-shadow: var(--shadow);
    padding: clamp(18px, 4vw, 36px);
  }

  .poster-stage {
    min-height: min(760px, calc(100vh - 92px));
    padding: 0;
    background:
      radial-gradient(circle at 74% 54%, rgba(37,35,31,0.14) 0 1px, transparent 2px) 0 0 / 10px 10px,
      repeating-conic-gradient(from 4deg at 50% 52%, rgba(37,35,31,0.13) 0 2deg, transparent 2deg 8deg),
      linear-gradient(#fffdf4 0 74%, #f7f1e2 74% 100%);
  }

  .poster-stage .title-actions {
    position: absolute;
    left: clamp(14px, 4vw, 38px);
    right: clamp(14px, 4vw, 38px);
    bottom: 48px;
    z-index: 6;
    max-width: none;
    margin: 0;
  }

  .poster-stage::before {
    top: 18px;
    left: -22%;
    height: clamp(56px, 9vw, 86px);
    transform: rotate(-5deg);
    z-index: 1;
  }

  .poster-stage::after {
    display: none;
  }

  .poster-top {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: start;
    padding: clamp(14px, 3vw, 26px) clamp(14px, 4vw, 38px) 0;
  }

  .poster-label,
  .poster-stamp {
    border: 4px solid #25231f;
    background: #ffd84a;
    color: #25231f;
    font-weight: 1000;
    line-height: 1.1;
    box-shadow: 0 5px 0 rgba(37,35,31,0.22);
  }

  .poster-label {
    padding: 8px 12px;
    font-size: clamp(22px, 4vw, 36px);
    writing-mode: vertical-rl;
    letter-spacing: 0.04em;
  }

  .poster-stamp {
    justify-self: end;
    padding: 8px 10px;
    transform: rotate(-12deg);
    font-size: clamp(11px, 2vw, 14px);
    text-align: center;
  }

  .poster-title-block {
    text-align: right;
    color: #25231f;
  }

  .poster-kicker {
    font-size: clamp(12px, 2.2vw, 18px);
    font-weight: 1000;
    letter-spacing: 0.12em;
  }

  .poster-title {
    margin: 0;
    font-size: clamp(48px, 12vw, 130px);
    line-height: 0.88;
    font-weight: 1000;
    letter-spacing: 0.02em;
    transform: rotate(2deg);
    text-shadow: 0 6px 0 rgba(37,35,31,0.12);
  }

  .poster-subtitle {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 12px;
    border: 3px solid #25231f;
    background: #fffdf4;
    font-size: clamp(16px, 3vw, 26px);
    font-weight: 1000;
    transform: rotate(-2deg);
  }

  .poster-machines {
    position: relative;
    z-index: 2;
    min-height: clamp(270px, 44vw, 390px);
    margin: -4px clamp(10px, 3vw, 26px) 92px;
  }

  .poster-burst {
    position: absolute;
    right: 7%;
    top: 27%;
    width: clamp(118px, 22vw, 210px);
    aspect-ratio: 1.45 / 1;
    display: grid;
    place-items: center;
    padding: 12px;
    color: #25231f;
    background: #9fe8ff;
    border: 4px solid #25231f;
    clip-path: polygon(9% 22%, 23% 24%, 28% 6%, 42% 20%, 57% 6%, 64% 24%, 84% 13%, 79% 34%, 96% 44%, 80% 57%, 91% 78%, 68% 72%, 59% 94%, 45% 76%, 25% 91%, 28% 68%, 6% 68%, 18% 49%);
    font-size: clamp(14px, 2.5vw, 24px);
    font-weight: 1000;
    text-align: center;
    transform: rotate(-8deg);
  }

  .poster-sfx {
    position: absolute;
    color: #25231f;
    font-size: clamp(34px, 7vw, 76px);
    font-weight: 1000;
    text-shadow: 3px 3px 0 #fffdf4;
    writing-mode: vertical-rl;
  }

  .poster-sfx.one { left: 17%; top: 23%; transform: rotate(-14deg); }
  .poster-sfx.two { right: 18%; bottom: 16%; transform: rotate(16deg); }

  .poster-machine {
    position: absolute;
    filter: drop-shadow(0 12px 0 rgba(37,35,31,0.18));
  }

  .poster-machine .body,
  .poster-machine .cab,
  .poster-machine .arm,
  .poster-machine .boom,
  .poster-machine .bucket,
  .poster-machine .track,
  .poster-machine .hook,
  .poster-machine .ball {
    position: absolute;
    border: 4px solid #25231f;
  }

  .machine-orange {
    left: 34%;
    top: 6%;
    width: clamp(220px, 36vw, 360px);
    height: clamp(158px, 25vw, 250px);
    transform: rotate(-8deg);
  }

  .machine-orange .track {
    left: 34%;
    bottom: 4%;
    width: 48%;
    height: 20%;
    border-radius: 999px;
    background: repeating-linear-gradient(90deg, #25231f 0 12px, #4b4a46 12px 24px);
  }

  .machine-orange .body {
    left: 34%;
    bottom: 22%;
    width: 40%;
    height: 24%;
    border-radius: 10px;
    background: #ec7d24;
  }

  .machine-orange .cab {
    left: 55%;
    bottom: 45%;
    width: 20%;
    height: 24%;
    border-radius: 8px 8px 2px 2px;
    background: linear-gradient(135deg, #bcecff 0 55%, #ec7d24 55%);
  }

  .machine-orange .boom {
    left: 22%;
    top: 18%;
    width: 62%;
    height: 18px;
    border-radius: 999px;
    background: #ec7d24;
    transform: rotate(-32deg);
    transform-origin: right center;
  }

  .machine-orange .arm {
    left: 7%;
    top: 13%;
    width: 30%;
    height: 16px;
    border-radius: 999px;
    background: #f2b325;
    transform: rotate(28deg);
  }

  .machine-orange .bucket {
    left: 0;
    top: 5%;
    width: 42px;
    height: 54px;
    border-radius: 4px 4px 22px 22px;
    background: #d9d4c8;
    transform: rotate(-22deg);
  }

  .machine-yellow {
    left: 7%;
    bottom: 4%;
    width: clamp(200px, 34vw, 330px);
    height: clamp(182px, 29vw, 285px);
    transform: rotate(-6deg);
  }

  .machine-yellow .track {
    left: 26%;
    bottom: 1%;
    width: 52%;
    height: 19%;
    border-radius: 999px;
    background: repeating-linear-gradient(90deg, #25231f 0 11px, #4b4a46 11px 22px);
  }

  .machine-yellow .body {
    left: 30%;
    bottom: 19%;
    width: 38%;
    height: 28%;
    border-radius: 8px;
    background: #f2b325;
  }

  .machine-yellow .cab {
    left: 48%;
    bottom: 47%;
    width: 22%;
    height: 24%;
    background: linear-gradient(135deg, #98d9f5 0 56%, #25231f 57%);
  }

  .machine-yellow .boom {
    left: 16%;
    top: 16%;
    width: 22%;
    height: 64%;
    border-radius: 999px;
    background: #f2b325;
    transform: rotate(20deg);
  }

  .machine-yellow .arm {
    left: 4%;
    top: 48%;
    width: 24%;
    height: 18px;
    border-radius: 999px;
    background: #ffd84a;
    transform: rotate(-34deg);
  }

  .machine-yellow .bucket {
    left: 0;
    bottom: 23%;
    width: 52px;
    height: 62px;
    border-radius: 0 0 42px 14px;
    background: #f2b325;
    transform: rotate(-18deg);
  }

  .machine-red {
    right: 5%;
    bottom: 8%;
    width: clamp(130px, 23vw, 230px);
    height: clamp(220px, 36vw, 350px);
    transform: rotate(10deg);
  }

  .machine-red .track {
    left: 22%;
    bottom: 0;
    width: 54%;
    height: 13%;
    border-radius: 999px;
    background: #25231f;
  }

  .machine-red .body {
    left: 28%;
    bottom: 12%;
    width: 44%;
    height: 16%;
    border-radius: 8px;
    background: #c7352e;
  }

  .machine-red .boom {
    left: 48%;
    bottom: 25%;
    width: 18px;
    height: 68%;
    border-radius: 999px;
    background: repeating-linear-gradient(#c7352e 0 18px, #fffdf4 18px 25px);
    transform: rotate(-18deg);
    transform-origin: bottom center;
  }

  .machine-red .arm {
    left: 70%;
    top: 15%;
    width: 5px;
    height: 46%;
    background: #25231f;
  }

  .machine-red .hook {
    left: 64%;
    top: 58%;
    width: 28px;
    height: 34px;
    border-radius: 0 0 18px 18px;
    border-top: 0;
    background: transparent;
  }

  .poster-footer {
    position: absolute;
    left: clamp(14px, 4vw, 38px);
    right: clamp(14px, 4vw, 38px);
    bottom: 10px;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    padding: 0;
    color: #25231f;
    font-weight: 1000;
  }

  .poster-date {
    font-size: clamp(17px, 3vw, 32px);
  }

  .poster-place {
    font-size: clamp(12px, 2vw, 18px);
    text-align: right;
  }

  .poster-image-stage {
    min-height: min(780px, calc(100vh - 92px));
    padding: clamp(10px, 2vw, 18px);
    display: grid;
    grid-template-rows: minmax(0, 1fr) auto;
    gap: 12px;
    background:
      repeating-linear-gradient(135deg, #25231f 0 18px, #ffd84a 18px 36px);
  }

  .poster-image-wrap {
    position: relative;
    z-index: 2;
    min-height: 0;
    display: grid;
    place-items: center;
    overflow: hidden;
    border: 5px solid #25231f;
    border-radius: 10px;
    background: #fffdf4;
    box-shadow: 0 10px 0 rgba(37,35,31,0.22);
  }

  .poster-image {
    width: 100%;
    height: 100%;
    max-height: calc(100vh - 220px);
    object-fit: contain;
    display: block;
    background: #fff;
  }

  .poster-image-stage .title-actions {
    position: relative;
    z-index: 3;
    left: auto;
    right: auto;
    bottom: auto;
    max-width: 760px;
    width: min(760px, 100%);
    margin: 0 auto;
  }

  .title-stage::before,
  .title-stage::after {
    content: "";
    position: absolute;
    border: 4px solid #25231f;
    width: 160%;
    height: 42px;
    background: repeating-linear-gradient(135deg, #25231f 0 22px, #ffd84a 22px 44px);
    opacity: 0.95;
    pointer-events: none;
  }

  .title-stage::before {
    top: 34px;
    left: -30%;
    border-right: 4px solid #25231f;
    border-bottom: 4px solid #25231f;
    transform: rotate(-8deg);
  }

  .title-stage::after {
    top: auto;
    right: -30%;
    bottom: 34px;
    border-left: 4px solid #25231f;
    border-bottom: 4px solid #25231f;
    transform: rotate(7deg);
  }

  .title-copy {
    position: relative;
    z-index: 2;
    display: grid;
    justify-items: center;
    text-align: center;
    gap: 12px;
    max-width: 760px;
    margin: 0 auto;
    color: #fff;
  }

  .studio-bubbles {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }

  .studio-bubbles span {
    display: grid;
    place-items: center;
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: #25231f;
    color: #ffd84a;
    font-weight: 1000;
    font-size: 20px;
    box-shadow: 0 5px 0 rgba(0,0,0,0.22), inset 0 0 0 2px #ffd84a;
  }

  .title-yellow {
    margin: 8px 0 0;
    color: #fff2a8;
    font-size: clamp(40px, 8vw, 84px);
    line-height: 1;
    font-weight: 1000;
  }

  .title-main {
    margin: 0;
    color: #fff7d0;
    font-size: clamp(42px, 9vw, 96px);
    line-height: 1.05;
    font-weight: 1000;
    letter-spacing: 0.08em;
    text-shadow: 0 5px 0 #25231f, 0 9px 0 rgba(37,35,31,0.18);
  }

  .tile-title {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 8px;
  }

  .tile-title span {
    display: grid;
    place-items: center;
    min-width: clamp(46px, 8vw, 72px);
    min-height: clamp(46px, 8vw, 72px);
    padding: 6px 10px;
    border-radius: 6px;
    color: #fff;
    font-size: clamp(26px, 5vw, 52px);
    line-height: 1;
    font-weight: 1000;
    box-shadow: 0 7px 0 rgba(0, 75, 110, 0.18);
  }

  .tile-title .orange,
  .tile-title .teal,
  .tile-title .pink,
  .tile-title .blue,
  .tile-title .yellow,
  .tile-title .green {
    color: #25231f;
    background: #ffd84a;
    box-shadow: 0 7px 0 rgba(37,35,31,0.28), inset 0 0 0 3px #25231f;
  }

  .home-art-wrap {
    position: relative;
    z-index: 2;
    width: min(360px, 74vw);
    margin: 16px auto 0;
  }

  .home-art-wrap .paint-frame {
    padding: 10px;
    border-radius: 12px;
    box-shadow: 0 12px 24px rgba(0, 93, 124, 0.16);
  }

  .title-actions {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin: 18px auto 0;
    max-width: 760px;
  }

  .title {
    margin: 0 0 10px;
    font-size: clamp(34px, 7vw, 62px);
    line-height: 1.05;
    font-weight: 1000;
  }

  .subtitle {
    margin: 0 0 20px;
    font-size: clamp(18px, 3.2vw, 26px);
    line-height: 1.55;
    color: var(--muted);
    font-weight: 700;
  }

  .big-buttons {
    display: grid;
    gap: 12px;
  }

  button {
    border: 0;
    font: inherit;
    cursor: pointer;
  }

  .btn {
    min-height: 62px;
    border-radius: 22px;
    padding: 16px 18px;
    font-size: clamp(19px, 3.5vw, 26px);
    font-weight: 950;
    color: #25231f;
    border: 4px solid #25231f;
    background:
      repeating-linear-gradient(135deg, rgba(37,35,31,0.16) 0 12px, transparent 12px 24px),
      linear-gradient(135deg, #ffd84a, #f29f24);
    box-shadow: 0 9px 0 rgba(37,35,31,0.24);
    transform: translateY(0);
  }

  .btn:active {
    transform: translateY(2px) scale(0.99);
    box-shadow: 0 5px 0 rgba(37,35,31,0.22);
  }

  .btn.secondary {
    color: #25231f;
    background: #f7f1e2;
    border: 4px solid #25231f;
    box-shadow: 0 7px 0 rgba(37,35,31,0.20);
  }

  .btn.green {
    background:
      repeating-linear-gradient(135deg, rgba(37,35,31,0.14) 0 12px, transparent 12px 24px),
      linear-gradient(135deg, #7cc45a, #44a06c);
  }

  .btn.yellow {
    color: #25231f;
    background:
      repeating-linear-gradient(135deg, rgba(37,35,31,0.15) 0 12px, transparent 12px 24px),
      linear-gradient(135deg, #ffd84a, #ffb22d);
  }

  .btn.small {
    min-height: 48px;
    border-radius: 18px;
    font-size: 17px;
    padding: 11px 14px;
  }

  .paint-frame {
    background: #25231f;
    border-radius: 16px;
    padding: 14px;
    box-shadow: inset 0 0 0 5px #ffd84a, 0 10px 0 rgba(37,35,31,0.18);
  }

  .demolition-scene {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 10px;
    background:
      radial-gradient(circle at 78% 18%, rgba(255,255,255,0.88) 0 22px, transparent 23px),
      linear-gradient(#79cbe9 0 48%, #c49b63 48% 58%, #8a8172 58% 100%);
  }

  .demolition-scene::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 27%;
    background:
      repeating-linear-gradient(135deg, #25231f 0 14px, #ffd84a 14px 28px) 0 0 / 100% 18px no-repeat,
      radial-gradient(circle at 12% 52%, #6b6254 0 9px, transparent 10px),
      radial-gradient(circle at 86% 62%, #5d554b 0 12px, transparent 13px),
      linear-gradient(#8a8172, #5d554b);
  }

  .wrecking-crane {
    position: absolute;
    left: 18px;
    bottom: 22%;
    width: 42%;
    height: 68%;
    z-index: 3;
  }

  .crane-mast {
    position: absolute;
    left: 12%;
    bottom: 0;
    width: 16px;
    height: 82%;
    border-radius: 10px;
    background: #f2b325;
    box-shadow: inset 0 0 0 3px rgba(92,75,98,0.18);
  }

  .crane-arm {
    position: absolute;
    left: 13%;
    top: 13%;
    width: 82%;
    height: 14px;
    border-radius: 12px;
    background: #f2b325;
    transform: rotate(-11deg);
    transform-origin: left center;
    box-shadow: inset 0 0 0 3px rgba(92,75,98,0.18);
  }

  .crane-cable {
    position: absolute;
    left: 73%;
    top: 14%;
    width: 5px;
    height: 34%;
    border-radius: 999px;
    background: #4f4654;
    transform-origin: top center;
  }

  .wrecking-ball {
    position: absolute;
    left: calc(73% - 27px);
    top: 45%;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.82), transparent 18%),
      linear-gradient(135deg, #9aa1aa, #4e5964);
    box-shadow: 0 8px 0 rgba(45,54,62,0.18);
  }

  .demolition-scene.smashing .crane-cable,
  .demolition-scene.smashing .wrecking-ball {
    animation: wreckSwing 620ms cubic-bezier(.18,.86,.24,1.02);
  }

  .demolition-scene.smash-ready {
    cursor: pointer;
  }

  .demolition-scene.smash-ready .wrecking-ball {
    animation: ballReady 760ms ease-in-out infinite;
    box-shadow: 0 8px 0 rgba(45,54,62,0.18), 0 0 0 8px rgba(255,216,74,0.32);
  }

  @keyframes ballReady {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(10px); }
  }

  @keyframes wreckSwing {
    0% { transform: translateX(0) rotate(0deg); }
    42% { transform: translateX(118px) rotate(-18deg); }
    62% { transform: translateX(94px) rotate(-10deg); }
    100% { transform: translateX(0) rotate(0deg); }
  }

  .building-wrap {
    position: absolute;
    right: 9%;
    bottom: 21%;
    width: 43%;
    height: 70%;
    display: flex;
    flex-direction: column-reverse;
    justify-content: flex-start;
    z-index: 2;
  }

  .building-floor {
    position: relative;
    flex: 1;
    min-height: 18%;
    margin-top: 4px;
    border: 4px solid #4f4654;
    border-bottom-width: 3px;
    background: var(--floor-color, #8fd3ff);
    box-shadow: inset 0 -8px 0 rgba(0,0,0,0.08);
    transition: transform 360ms ease, opacity 360ms ease, filter 360ms ease;
  }

  .building-floor::before {
    content: "";
    position: absolute;
    inset: 14% 12%;
    background:
      linear-gradient(90deg, #fff6a8 0 19%, transparent 19% 31%, #fff6a8 31% 50%, transparent 50% 62%, #fff6a8 62% 81%, transparent 81%),
      linear-gradient(#fff6a8 0 36%, transparent 36% 64%, #fff6a8 64%);
    opacity: 0.95;
  }

  .building-floor.broken {
    transform: translate(28px, 36px) rotate(12deg) scale(0.88);
    opacity: 0;
    filter: saturate(0.7);
  }

  .rubble {
    position: absolute;
    right: 8%;
    bottom: 20%;
    width: 46%;
    min-height: 52px;
    z-index: 4;
    pointer-events: none;
  }

  .rubble-piece {
    position: absolute;
    bottom: 0;
    width: 22px;
    height: 18px;
    border: 3px solid #4f4654;
    border-radius: 5px;
    background: #a9b8c8;
    transform: translate(var(--x), var(--y)) rotate(var(--r));
    animation: rubblePop 460ms ease-out;
  }

  @keyframes rubblePop {
    0% { transform: translate(10px, -52px) rotate(0deg) scale(0.5); opacity: 0; }
    100% { transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(1); opacity: 1; }
  }

  .coloring-board {
    position: relative;
    width: 100%;
    aspect-ratio: var(--art-ratio, 1 / 1);
    overflow: hidden;
    border-radius: 18px;
    background: #fff;
  }

  .coloring-canvas,
  .line-art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .coloring-canvas {
    z-index: 1;
    touch-action: none;
    cursor: crosshair;
  }

  .line-art {
    z-index: 2;
    object-fit: contain;
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  .coloring-board:not(.paint-enabled) .coloring-canvas {
    cursor: default;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  [data-part] {
    transition: fill 450ms ease, transform 280ms ease;
  }

  .outline {
    stroke: #5c4b62;
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .thin {
    stroke-width: 3.5;
  }

  .face {
    fill: none;
    stroke: #5c4b62;
    stroke-width: 4;
    stroke-linecap: round;
  }

  .theme-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 11px;
    margin: 12px 0 18px;
  }

  .theme-card {
    background:
      linear-gradient(135deg, rgba(255,255,255,0.32), transparent 42%),
      var(--theme-bg, #ffd84a);
    border: 4px solid #25231f;
    border-radius: 12px;
    padding: 12px 8px;
    min-height: 78px;
    font-size: clamp(18px, 3vw, 22px);
    font-weight: 950;
    color: #25231f;
    box-shadow: 0 7px 0 rgba(37,35,31,0.20);
  }

  .theme-card[data-theme="cake"] { --theme-bg: #72c8ff; }
  .theme-card[data-theme="cat"] { --theme-bg: #ff907f; }
  .theme-card[data-theme="flower"] { --theme-bg: #ffd84a; }
  .theme-card[data-theme="bunny"] { --theme-bg: #85d86e; }

  .theme-card.selected {
    border-color: #25231f;
    background:
      repeating-linear-gradient(135deg, rgba(37,35,31,0.24) 0 10px, transparent 10px 20px),
      linear-gradient(135deg, rgba(255,255,255,0.4), transparent 38%),
      var(--theme-bg, #ffd84a);
    box-shadow: 0 9px 0 rgba(37,35,31,0.28);
    outline: 5px solid #fffdf4;
    transform: translateY(-3px);
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .game-grid {
    display: grid;
    grid-template-columns: 0.92fr 1.08fr;
    gap: 18px;
    align-items: start;
  }

  .progress {
    display: flex;
    gap: 8px;
    margin: 10px 0 14px;
    justify-content: center;
  }

  .dot {
    width: 38px;
    height: 30px;
    border-radius: 6px;
    background: #d4c8ad;
    border: 4px solid #25231f;
    box-shadow: 0 4px 0 rgba(37,35,31,0.18);
  }

  .dot.done:nth-child(1),
  .dot.done:nth-child(2),
  .dot.done:nth-child(3),
  .dot.done:nth-child(4),
  .dot.done:nth-child(5) {
    background: repeating-linear-gradient(135deg, #25231f 0 9px, #ffd84a 9px 18px);
  }

  .question-card {
    min-height: 520px;
    display: flex;
    flex-direction: column;
  }

  .q-label {
    display: inline-flex;
    align-self: flex-start;
    border-radius: 999px;
    padding: 8px 13px;
    font-size: 16px;
    font-weight: 950;
    color: #25231f;
    background: #ffd84a;
    border: 3px solid #25231f;
    margin-bottom: 12px;
  }

  .question {
    font-size: clamp(27px, 5vw, 44px);
    line-height: 1.25;
    font-weight: 1000;
    margin: 4px 0 16px;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: auto;
  }

  .choice {
    min-height: 72px;
    border-radius: 12px;
    background: #fff8dc;
    color: #25231f;
    font-size: clamp(24px, 4.4vw, 36px);
    font-weight: 1000;
    border: 4px solid #25231f;
    box-shadow: 0 7px 0 rgba(37,35,31,0.18);
    padding: 12px;
  }

  .choice:active {
    transform: scale(0.99);
  }

  .choice.correct {
    background: #c9f28b;
    border-color: #2d5a2a;
  }

  .choice.wrong {
    background: #ffc1aa;
    border-color: #9a2b20;
  }

  .feedback {
    min-height: 78px;
    margin: 12px 0 0;
    border-radius: 12px;
    padding: 13px 15px;
    background: #fff2b9;
    border: 3px dashed #25231f;
    color: #3a342b;
    font-size: clamp(18px, 3.2vw, 24px);
    line-height: 1.35;
    font-weight: 900;
  }

  .color-picker {
    display: none;
    margin: 12px 0 0;
  }

  .color-picker.show {
    display: block;
  }

  .tool-section {
    margin-top: 12px;
  }

  .tool-section:first-child {
    margin-top: 0;
  }

  .tool-label {
    color: #3a342b;
    font-size: 15px;
    font-weight: 950;
    margin: 0 0 7px;
  }

  .tool-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .color-swatch {
    aspect-ratio: 1;
    min-height: 54px;
    border-radius: 18px;
    border: 4px solid #fff;
    box-shadow: 0 8px 0 rgba(37,35,31,0.18), inset 0 0 0 2px rgba(92, 75, 98, 0.18);
    position: relative;
    overflow: hidden;
  }

  .color-swatch:active {
    transform: translateY(2px) scale(0.96);
  }

  .color-swatch.glitter::after {
    content: "ラメ";
    position: absolute;
    inset: auto 5px 5px;
    border-radius: 999px;
    padding: 2px 4px;
    background: rgba(255,255,255,0.78);
    color: #3a342b;
    font-size: 12px;
    font-weight: 950;
  }

  .color-swatch.eraser {
    background:
      linear-gradient(135deg, #ffffff 0 45%, #ffd6e8 45% 55%, #ffffff 55% 100%);
    color: #3a342b;
    font-size: 14px;
    font-weight: 950;
  }

  .brush-size-picker {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
  }

  .brush-size-picker.show {
    display: grid;
  }

  .brush-size-btn {
    min-height: 48px;
    border-radius: 18px;
    border: 3px solid #25231f;
    background: #fff;
    color: #3a342b;
    font-size: 16px;
    font-weight: 950;
    box-shadow: 0 6px 0 rgba(37,35,31,0.18);
  }

  .brush-size-btn.selected {
    border-color: #25231f;
    background: #ffd84a;
    box-shadow: 0 7px 0 rgba(37,35,31,0.22);
  }

  .brush-size-btn::before {
    content: "";
    display: block;
    width: 34px;
    height: var(--brush-preview);
    margin: 0 auto 4px;
    border-radius: 999px;
    background: #25231f;
  }

  .next-row {
    display: none;
    margin-top: 12px;
  }

  .next-row.show {
    display: grid;
  }

  .mini-status {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 11px;
    font-size: 16px;
    color: #3a342b;
    font-weight: 800;
  }

  .finish {
    text-align: center;
  }

  .finish h2 {
    font-size: clamp(34px, 6vw, 58px);
    margin: 8px 0 8px;
  }

  .finish p {
    font-size: clamp(19px, 3vw, 26px);
    color: #5b5144;
    font-weight: 800;
    line-height: 1.5;
  }

  .parent-note {
    margin-top: 16px;
    border-top: 3px dashed #8b7a61;
    padding-top: 14px;
    color: #5b5144;
    font-size: 15px;
    line-height: 1.55;
    user-select: text;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 14px 0;
  }

  .stat {
    background: #fff8dc;
    border-radius: 12px;
    padding: 14px;
    border: 3px solid #25231f;
  }

  .stat .num {
    font-size: 31px;
    font-weight: 1000;
    color: #25231f;
  }

  .stat .cap {
    color: var(--muted);
    font-weight: 850;
  }

  .skill-list {
    display: grid;
    gap: 10px;
    margin: 12px 0;
  }

  .skill-row {
    background: #fff8dc;
    border-radius: 12px;
    padding: 12px;
    border: 3px solid #25231f;
  }

  .skill-top {
    display: flex;
    justify-content: space-between;
    font-weight: 900;
    gap: 8px;
  }

  .bar {
    height: 14px;
    background: #d4c8ad;
    border-radius: 999px;
    margin-top: 8px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: repeating-linear-gradient(135deg, #25231f 0 9px, #ffd84a 9px 18px);
    border-radius: 999px;
  }

  .mistake-list {
    background: #fff8dc;
    border-radius: 12px;
    padding: 14px;
    border: 3px solid #25231f;
    font-size: 16px;
    line-height: 1.55;
    user-select: text;
  }

  .mistake-list li {
    margin-bottom: 8px;
  }

  .footer-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 30px;
    animation: pop 800ms ease-out forwards;
    z-index: 99;
  }

  @keyframes pop {
    0% { transform: translateY(0) scale(0.4) rotate(0deg); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-80px) scale(1.25) rotate(18deg); opacity: 0; }
  }

  @media (max-width: 760px) {
    body { padding: 10px; }
    .hero, .game-grid {
      grid-template-columns: 1fr;
    }
    .title-stage {
      min-height: calc(100vh - 76px);
      padding: 16px 12px 18px;
    }
    .title-stage::before {
      top: 30px;
      left: -42%;
    }
    .title-stage::after {
      top: auto;
      right: -42%;
      bottom: 24px;
    }
    .studio-bubbles span {
      width: 35px;
      height: 35px;
      font-size: 16px;
    }
    .title-main {
      letter-spacing: 0.04em;
    }
    .title-actions {
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .theme-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .mode-grid {
      grid-template-columns: 1fr;
    }
    .stats-grid {
      grid-template-columns: 1fr;
    }
    .question-card {
      min-height: auto;
    }
    .paint-frame {
      max-width: 470px;
      margin: 0 auto;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">🏗️ げんのてっきゅうでバカーン</div>
    <button id="homeBtn" class="btn secondary small">おうち</button>
  </div>

  <section id="homeScreen" class="screen active">
    <div class="card title-stage poster-image-stage">
      <div class="poster-image-wrap">
        <img class="poster-image" src="title-construction-poster.png" alt="工事中の重機ポスター">
      </div>
      <div class="title-actions">
        <button id="startBtn" class="btn">はじめる</button>
        <button id="weakBtn" class="btn green">にがて れんしゅう</button>
        <button id="statsBtn" class="btn secondary">きろく</button>
      </div>
    </div>
  </section>

  <section id="setupScreen" class="screen">
    <div class="card">
      <h2 class="title" style="font-size:clamp(30px,6vw,52px);">どの ビルにする？</h2>
      <div id="themeGrid" class="theme-grid"></div>

      <h2 class="title" style="font-size:clamp(26px,5vw,42px); margin-top:16px;">なにを やる？</h2>
      <div class="mode-grid">
        <button data-mode="math" class="btn yellow modeBtn">さんすう</button>
        <button data-mode="jp" class="btn green modeBtn">こくご</button>
        <button data-mode="mix" class="btn modeBtn">まぜまぜ</button>
      </div>
      <div class="parent-note">
        とーと用メモ：通常モードでも、過去に間違えた問題が少しだけ混ざります。遊びながら復習する仕組みです。
      </div>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="game-grid">
      <div class="card">
        <div class="paint-frame" id="gameArt"></div>
        <div class="progress" id="progressDots"></div>
        <div class="mini-status">
          <span id="attemptStatus">0もん</span>
          <span id="themeStatus">テーマ</span>
        </div>
      </div>

      <div class="card question-card">
        <div id="qLabel" class="q-label">さんすう</div>
        <div id="questionText" class="question">もんだい</div>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback">こたえを えらんでね。</div>
        <div id="colorPicker" class="color-picker"></div>
        <div id="brushSizePicker" class="brush-size-picker" aria-label="ペンと消しゴムのふとさ"></div>
        <div id="nextRow" class="next-row">
          <button id="nextBtn" class="btn">つぎへ</button>
        </div>
      </div>
    </div>
  </section>

  <section id="finishScreen" class="screen">
    <div class="card finish">
      <div class="paint-frame" id="finishArt" style="max-width:520px; margin:0 auto 14px;"></div>
      <h2 id="finishTitle">かんせい！</h2>
      <p id="finishText">よくがんばったね。</p>
      <div class="footer-actions">
        <button id="againBtn" class="btn">もう1かい</button>
        <button id="finishStatsBtn" class="btn secondary">きろくをみる</button>
      </div>
    </div>
  </section>

  <section id="statsScreen" class="screen">
    <div class="card">
      <h2 class="title" style="font-size:clamp(30px,6vw,52px);">とーと用 きろく</h2>
      <p class="subtitle" style="margin-bottom:8px;">正解率・苦手・集中時間をこのiPad内に保存します。</p>

      <div class="stats-grid">
        <div class="stat"><div id="statSessions" class="num">0</div><div class="cap">プレイ回数</div></div>
        <div class="stat"><div id="statAccuracy" class="num">0%</div><div class="cap">全体正解率</div></div>
        <div class="stat"><div id="statTime" class="num">0分</div><div class="cap">合計時間</div></div>
      </div>

      <h3>分野別</h3>
      <div id="skillList" class="skill-list"></div>

      <h3>最近のにがて</h3>
      <ol id="mistakeList" class="mistake-list"></ol>

      <div class="footer-actions">
        <button id="backHomeBtn" class="btn">もどる</button>
        <button id="resetBtn" class="btn secondary">きろくをリセット</button>
      </div>

      <div class="parent-note">
        使い方：正解率が低い分野を長く練習させるより、翌日に「にがて れんしゅう」を1回だけ入れるのがおすすめです。短く、楽しく、少し戻すのが続きます。
      </div>
    </div>
  </section>
</div>

<script>
(function() {
  var STORE_KEY = "gen_nurie_quiz_v2";
  var palette = ["#ffd84a", "#2f2d28", "#8a8172", "#ef5b45", "#5eb7d7"];
  var paintTools = [
    { color: "#ffd84a" },
    { color: "#ffe08a", glitter: true },
    { color: "#83c9ff" },
    { color: "#9be7b0" },
    { color: "#8a8172", glitter: true },
    { color: "#ff8f8f" },
    { color: "#ffbf75", glitter: true },
    { color: "#b8845a" },
    { color: "#c8f55f" },
    { color: "#63e6d7", glitter: true },
    { color: "#f4a6ff", glitter: true },
    { eraser: true }
  ];
  var brushSizes = [
    { key: "thick", label: "ふとい", width: 24 },
    { key: "medium", label: "ふつう", width: 15 },
    { key: "thin", label: "ほそい", width: 7 }
  ];
  var selectedTheme = "cake";
  var currentScreen = "homeScreen";
  var audioUnlocked = false;
  var audioCtx = null;

  function bindTap(el, fn) {
    var lastTouch = 0;
    el.addEventListener("touchend", function(e) {
      e.preventDefault();
      lastTouch = Date.now();
      unlockSound();
      fn(e);
    }, { passive: false });
    el.addEventListener("click", function(e) {
      if (Date.now() - lastTouch < 600) return;
      unlockSound();
      fn(e);
    });
  }

  function unlockSound() {
    try {
      var AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      audioCtx = audioCtx || new AudioContext();
      if (audioCtx.state === "suspended") audioCtx.resume();
      audioUnlocked = true;
    } catch (e) {}
  }

  function tone(freq, start, duration, type, volume) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume || 0.12, start + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + duration + 0.03);
  }

  function thump(freq, start, duration, volume) {
    if (!audioCtx) return;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(freq, start);
    osc.frequency.exponentialRampToValueAtTime(Math.max(45, freq * 0.45), start + duration);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume || 0.18, start + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + duration + 0.04);
  }

  function crash(start, duration, volume) {
    if (!audioCtx) return;
    var length = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
    var buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < length; i++) {

    var noise = audioCtx.createBufferSource();
    var filter = audioCtx.createBiquadFilter();
    var gain = audioCtx.createGain();
    noise.buffer = buffer;
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(1800, start);
    filter.frequency.exponentialRampToValueAtTime(260, start + duration);
    gain.gain.setValueAtTime(volume || 0.22, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start(start);
  }

        tone(520, now, 0.08, "triangle", 0.08);
        tone(780, now + 0.07, 0.08, "triangle", 0.07);
      }
    } catch (e) {}
  }

  function showScreen(id) {
    var screens = document.querySelectorAll(".screen");
    for (var i = 0; i < screens.length; i++) screens[i].classList.remove("active");

  function renderTheme(containerId, themeKey, filledCount, colors) {

  function renderDemolitionScene(containerId, themeKey, brokenCount) {
    var themeColors = {
      cake: ["#6fc8ff", "#8fd3ff", "#56b4ee", "#a4ddff", "#6fc8ff"],
      cat: ["#ff9c9c", "#ffb0a0", "#ff8484", "#ffc0a8", "#ff9c9c"],
      flower: ["#ffe08a", "#ffd05d", "#ffe9a8", "#ffc94d", "#ffe08a"],

    };

    for (var i = 0; i < 5; i++) {
      floors += '<div class="building-floor' + (i < brokenCount ? ' broken' : '') + '" data-floor="' + i + '" style="--floor-color:' + colors[i] + '"></div>';

  function handleSceneSmash() {
    if (!session || !session.smashReady || session.pendingSmashPart === null) return;
    var part = session.pendingSmashPart;
    session.smashReady = false;
    session.pendingSmashPart = null;
    var scene = $("gameArtScene");
    if (scene) scene.classList.remove("smash-ready");
    smashBuilding(part, session.pendingSmashExplain || "");
  }

  function smashBuilding(partIndex, explainText) {
    if (!session) return;
    var scene = $("gameArtScene");
    if (!scene) return;
    var floor = scene.querySelector('[data-floor="' + partIndex + '"]');
    scene.classList.remove("smashing");
    void scene.offsetWidth;
    scene.classList.add("smashing");
    setTimeout(function() {
      if (floor) floor.classList.add("broken");
      addRubble(scene, partIndex);
      playEffect("smash");
      session.correctParts++;
      renderDots();
      $("feedback").textContent = praiseText() + "　鉄球で ビルを こわせた！　" + explainText;
      afterAnswerComplete();
    }, 300);
  }

  function addRubble(scene, partIndex) {
    var rubble = scene.querySelector(".rubble");
    if (!rubble) return;
    for (var i = 0; i < 4; i++) {
      var piece = document.createElement("span");
      piece.className = "rubble-piece";
      piece.style.setProperty("--x", (12 + partIndex * 10 + i * 18) + "px");
      piece.style.setProperty("--y", (2 - (i % 2) * 9) + "px");
      piece.style.setProperty("--r", ((i * 23 + partIndex * 11) % 48 - 24) + "deg");
      rubble.appendChild(piece);
    }
  }

  function renderImageCanvas(containerId, themeKey) {
    var art = imageThemes[themeKey];
    var container = $(containerId);
    container.innerHTML =
      '<div class="coloring-board" id="' + containerId + 'Board" style="--art-ratio:' + art.width + ' / ' + art.height + ';">' +
        '<canvas class="coloring-canvas" width="' + art.width + '" height="' + art.height + '"></canvas>' +
        '<img class="line-art" src="' + art.src + '" alt="' + themes[themeKey].name + 'のぬりえ">' +
      '</div>';

    var canvas = container.querySelector("canvas");
    var ctx = canvas.getContext("2d");
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    if (containerId === "gameArt") {
      bindCanvasPaint(canvas, container.querySelector(".coloring-board"));
    }

    if (session && session.paintingData && containerId !== "homeArt") {
      var img = new Image();
      img.onload = function() {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      };
      img.src = session.paintingData;
    }
  }

  function bindCanvasPaint(canvas, board) {
    var lastPoint = null;

    function point(e) {
      var rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function start(e) {
      if (!session || !session.paintEnabled || (!session.paintColor && !session.eraserEnabled)) return;
      e.preventDefault();
      drawing = true;
      board.classList.add("paint-enabled");
      var p = point(e);
      lastPoint = p;
      var ctx = canvas.getContext("2d");
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.globalCompositeOperation = session.eraserEnabled ? "destination-out" : "source-over";
      ctx.strokeStyle = session.eraserEnabled ? "rgba(0,0,0,1)" : session.paintColor;
      ctx.lineWidth = currentBrushWidth();
      ctx.globalAlpha = session.eraserEnabled ? 1 : 0.7;
      ctx.lineTo(p.x + 0.1, p.y + 0.1);
      ctx.stroke();
      if (session.glitterEnabled && !session.eraserEnabled) addGlitter(ctx, p.x, p.y);
    }

    function move(e) {
      if (!drawing || !session || !session.paintEnabled) return;
      e.preventDefault();
      var p = point(e);
      var ctx = canvas.getContext("2d");
      ctx.beginPath();
      ctx.moveTo(lastPoint.x, lastPoint.y);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      if (session.glitterEnabled && !session.eraserEnabled) addGlitter(ctx, p.x, p.y);
      lastPoint = p;
    }

    function stop() {
      if (!drawing) return;
      drawing = false;
      lastPoint = null;
      session.paintingData = canvas.toDataURL("image/png");
    }

    canvas.addEventListener("pointerdown", start);
    canvas.addEventListener("pointermove", move);
    canvas.addEventListener("pointerup", stop);
    canvas.addEventListener("pointerleave", stop);
    canvas.addEventListener("pointercancel", stop);
  }

  function currentBrushWidth() {
    var width = session && session.brushWidth ? session.brushWidth : 15;
    return session && session.eraserEnabled ? width + 6 : width;
  }

  function addGlitter(ctx, x, y) {
    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    ctx.globalAlpha = 0.9;
    for (var i = 0; i < 4; i++) {
      var a = Math.random() * Math.PI * 2;
      var d = Math.random() * 18;
      var r = 1.5 + Math.random() * 2.5;
      ctx.fillStyle = i % 2 ? "rgba(255,255,255,0.95)" : "rgba(255,232,132,0.95)";
      ctx.beginPath();
      ctx.arc(x + Math.cos(a) * d, y + Math.sin(a) * d, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function fillPart(partIndex, color) {
    if (session && imageThemes[session.theme]) return;
    var nodes = $("gameArt").querySelectorAll('[data-part="' + partIndex + '"]');
    for (var i = 0; i < nodes.length; i++) {
      nodes[i].setAttribute("fill", color || palette[partIndex % palette.length]);
      nodes[i].style.transform = "scale(1.025)";
      (function(n) {
        setTimeout(function(){ n.style.transform = "scale(1)"; }, 260);
      })(nodes[i]);
    }
  }

  function hideColorPicker() {
    $("colorPicker").classList.remove("show");
    $("colorPicker").innerHTML = "";
    hideBrushSizePicker();
  }

  function hideBrushSizePicker() {
    $("brushSizePicker").classList.remove("show");
    $("brushSizePicker").innerHTML = "";
  }

  function showColorPicker(partIndex, explainText) {
    var picker = $("colorPicker");
    picker.innerHTML = "";
    picker.classList.add("show");
    $("feedback").textContent = praiseText() + "　すきな いろや けしごむを えらんでね。";
    if (session && imageThemes[session.theme]) {
      renderBrushSizePicker();
    } else {
      hideBrushSizePicker();
    }
    appendPaintToolSection(picker, "ふつうの色", paintTools.filter(function(tool) {
      return !tool.glitter && !tool.eraser;
    }), partIndex, explainText);
    appendPaintToolSection(picker, "ラメ", paintTools.filter(function(tool) {
      return tool.glitter;
    }), partIndex, explainText);
    appendPaintToolSection(picker, "消しゴム", paintTools.filter(function(tool) {
      return tool.eraser;
    }), partIndex, explainText);
  }

  function appendPaintToolSection(picker, label, tools, partIndex, explainText) {
    if (!tools.length) return;
    var section = document.createElement("div");
    section.className = "tool-section";
    var title = document.createElement("div");
    title.className = "tool-label";
    title.textContent = label;
    var grid = document.createElement("div");
    grid.className = "tool-grid";
    section.appendChild(title);
    section.appendChild(grid);
    for (var i = 0; i < tools.length; i++) {
      grid.appendChild(createPaintToolButton(tools[i], i, label, partIndex, explainText));
    }
    picker.appendChild(section);
  }

  function createPaintToolButton(tool, index, groupLabel, partIndex, explainText) {
    var b = document.createElement("button");
    b.className = "color-swatch" + (tool.glitter ? " glitter" : "") + (tool.eraser ? " eraser" : "");
    if (tool.eraser) {
      b.textContent = "消しゴム";
      b.setAttribute("aria-label", "けしごむ");
      b.setAttribute("data-eraser", "1");
    } else {
      b.style.background = tool.glitter ? "radial-gradient(circle at 28% 24%, #fff 0 6%, transparent 7%), radial-gradient(circle at 68% 62%, #fff 0 5%, transparent 6%), " + tool.color : tool.color;
      b.setAttribute("aria-label", (tool.glitter ? "ラメいろ " : "いろ ") + (index + 1));
      b.setAttribute("data-color", tool.color);
      if (tool.glitter) b.setAttribute("data-glitter", "1");
    }
    bindTap(b, function(e) {
      choosePaintTool(e.currentTarget, partIndex, explainText);
    });
    return b;
  }

  function renderBrushSizePicker() {
    var picker = $("brushSizePicker");
    picker.innerHTML = "";
    picker.classList.add("show");
    for (var i = 0; i < brushSizes.length; i++) {
      var size = brushSizes[i];
      var b = document.createElement("button");
      b.className = "brush-size-btn" + (session && session.brushSize === size.key ? " selected" : "");
      b.textContent = size.label;
      b.setAttribute("data-size", size.key);
      b.setAttribute("data-width", size.width);
      b.setAttribute("aria-label", (session && session.eraserEnabled ? "消しゴム" : "ペン") + "の太さ " + size.label);
      b.style.setProperty("--brush-preview", Math.max(4, Math.round(size.width / 2)) + "px");
      bindTap(b, function(e) {
        chooseBrushSize(e.currentTarget);
      });
      picker.appendChild(b);
    }
  }

  function chooseBrushSize(button) {
    if (!session) return;
    session.brushSize = button.getAttribute("data-size");
    session.brushWidth = parseInt(button.getAttribute("data-width"), 10) || 15;
    renderBrushSizePicker();
    $("feedback").textContent = (session.eraserEnabled ? "消しゴム" : "ペン") + "の ふとさを「" + button.textContent + "」に したよ。";
    playEffect("tap");
  }

  function choosePaintTool(button, partIndex, explainText) {
    if (!session) return;
    if (session.pendingPaintPart !== partIndex && !imageThemes[session.theme]) return;
    var color = button.getAttribute("data-color");
    var eraser = button.getAttribute("data-eraser") === "1";
    if (eraser && session.pendingPaintPart === partIndex) {
      session.eraserEnabled = true;
      session.glitterEnabled = false;
      session.paintEnabled = !!imageThemes[session.theme];
      renderBrushSizePicker();
      $("feedback").textContent = "消しゴムに したよ。太さも えらべるよ。";
      return;
    }
    var firstPaintForAnswer = session.pendingPaintPart === partIndex;
    if (firstPaintForAnswer) {
      session.colors[partIndex] = color;
      session.pendingPaintPart = null;
    }
    session.paintColor = color;
    session.eraserEnabled = eraser;
    session.glitterEnabled = button.getAttribute("data-glitter") === "1";
    session.paintEnabled = !!imageThemes[session.theme];
    if (imageThemes[session.theme]) {
      renderBrushSizePicker();
      var board = $("gameArt").querySelector(".coloring-board");
      if (board) board.classList.add("paint-enabled");
    }
    fillPart(partIndex, color);
    if (firstPaintForAnswer) {
      session.correctParts++;
      renderDots();
    }
    if (!imageThemes[session.theme]) hideColorPicker();
    $("feedback").textContent = imageThemes[session.theme] ? (eraser ? "けしごむで はみでたところを けせるよ。　" : "このいろで " + themes[session.theme].name + "を なぞって ぬってね。　") + explainText : "じょうずに ぬれたね！　" + explainText;
    playEffect("tap");
    if (firstPaintForAnswer) afterAnswerComplete();
  }

  function renderHomeArt() {
    var homeArt = $("homeArt");
    if (homeArt) renderTheme("homeArt", "cake", 5);
  }

  function renderThemeGrid() {
    var grid = $("themeGrid");
    grid.innerHTML = "";
    for (var key in themes) {
      if (!themes.hasOwnProperty(key)) continue;
      var b = document.createElement("button");
      b.className = "theme-card" + (key === selectedTheme ? " selected" : "");
      b.setAttribute("data-theme", key);
      b.innerHTML = '<div style="font-size:30px;">' + themes[key].emoji + '</div><div>' + themes[key].name + '</div>';
      bindTap(b, function(e) {
        var t = e.currentTarget.getAttribute("data-theme");
        selectedTheme = t;
        renderThemeGrid();
        playEffect("tap");
      });
      grid.appendChild(b);
    }
  }

  function startSession(mode) {
    var useMode = mode;
    if (mode === "weak" && data.mistakes.length === 0) useMode = "mix";

    session = {
      mode: useMode,
      requestedMode: mode,
      theme: selectedTheme,
      correctParts: 0,
      attempts: 0,
      maxAttempts: 8,
      targetParts: 5,
      start: Date.now(),
      current: null,
      answered: false,
      correctInSession: 0,
      colors: [],
      pendingPaintPart: null,
      pendingSmashPart: null,
      pendingSmashExplain: "",
      smashReady: false,
      paintColor: null,
      brushSize: "medium",
      brushWidth: 15,
      paintEnabled: false,
      eraserEnabled: false,
      glitterEnabled: false,
      paintingData: ""
    };

    renderTheme("gameArt", session.theme, 0);
    $("themeStatus").textContent = themes[session.theme].emoji + " " + themes[session.theme].name;
    renderDots();
    showScreen("gameScreen");
    nextQuestion();
    playEffect("tap");
  }

  function nextQuestion() {
    session.answered = false;
    session.pendingPaintPart = null;
    session.pendingSmashPart = null;
    session.pendingSmashExplain = "";
    session.smashReady = false;
    session.paintEnabled = false;
    session.eraserEnabled = false;
    session.glitterEnabled = false;
    $("nextRow").classList.remove("show");
    hideColorPicker();
    $("feedback").textContent = "こたえを えらんでね。";
    $("choices").innerHTML = "";
    session.current = makeQuestionForMode(session.mode);
    session.attempts++;
    $("attemptStatus").textContent = session.attempts + "もんめ";
    renderQuestion(session.current);
  }

  function renderQuestion(q) {
    $("qLabel").textContent = q.label;
    $("questionText").textContent = q.prompt;

    var choices = $("choices");
    choices.innerHTML = "";
    for (var i = 0; i < q.choices.length; i++) {
      var b = document.createElement("button");
      b.className = "choice";
      b.textContent = q.choices[i];
      b.setAttribute("data-answer", q.choices[i]);
      bindTap(b, onChoice);
      choices.appendChild(b);
    }
  }

  function onChoice(e) {
    if (!session || session.answered) return;
    session.answered = true;

    var selected = e.currentTarget.getAttribute("data-answer");
    var q = session.current;
    var ok = selected === q.answer;
    var btns = $("choices").querySelectorAll(".choice");

    for (var i = 0; i < btns.length; i++) {
      var a = btns[i].getAttribute("data-answer");
      if (a === q.answer) btns[i].classList.add("correct");
      if (a === selected && !ok) btns[i].classList.add("wrong");
    }

    recordAnswer(q, ok);

    if (ok) {
      var part = session.correctParts;
      session.correctInSession++;
      session.pendingSmashPart = part;
      session.pendingSmashExplain = q.explain;
      session.smashReady = true;
      var scene = $("gameArtScene");
      if (scene) scene.classList.add("smash-ready");
      $("feedback").textContent = praiseText() + "　鉄球を タップして ビルを こわそう！";
      playEffect("correct");
      sparkle();
    } else {
      $("feedback").textContent = "おしい！ こたえは「" + q.answer + "」。" + q.explain;
      playEffect("wrong");
      afterAnswerComplete();
    }
  }

  function afterAnswerComplete() {
    if (session.correctParts >= session.targetParts) {
      if (imageThemes[session.theme]) {
        $("nextBtn").textContent = "できた";
        $("nextRow").classList.add("show");
        return;
      }
      setTimeout(finishSession, 900);
    } else if (session.attempts >= session.maxAttempts) {
      // 最後は前向きに終わらせる。完成まであと少しの場合は、かんたん問題を出す。
      if (session.correctParts >= 3) {
        session.maxAttempts += 2;
        $("nextBtn").textContent = "あとすこし";
        $("nextRow").classList.add("show");
      } else {
        setTimeout(finishSession, 900);
      }
    } else {
      $("nextBtn").textContent = "つぎへ";
      $("nextRow").classList.add("show");
    }
  }

  function finishSession() {
    var seconds = Math.max(1, Math.round((Date.now() - session.start) / 1000));
    data.sessions++;
    data.totalSeconds += seconds;
    data.lastPlayed = new Date().toISOString();

    if (!data.themes[session.theme]) data.themes[session.theme] = 0;
    data.themes[session.theme]++;

    saveData();

    renderTheme("finishArt", session.theme, session.correctParts, session.colors);
    if (session.correctParts >= 5) {
      $("finishTitle").textContent = "ぜんぶ こわせた！ はなまる！";
      $("finishText").textContent = session.attempts + "もん がんばったよ。ビルこわし だいせいこう。";
      playEffect("finish");
    } else {
      $("finishTitle").textContent = "ここまで よくできたね！";
      $("finishText").textContent = session.attempts + "もん がんばったよ。つぎは もっと ビルを こわそう。";
      playEffect("finish");
    }
    showScreen("finishScreen");
  }

  function renderDots() {
    var p = $("progressDots");
    p.innerHTML = "";
    for (var i = 0; i < 5; i++) {
      var d = document.createElement("div");
      d.className = "dot" + (i < session.correctParts ? " done" : "");
      p.appendChild(d);
    }
  }

  function recordAnswer(q, ok) {
    data.total++;
    if (ok) data.correct++;

    if (!data.skills[q.skill]) data.skills[q.skill] = { total: 0, correct: 0 };
    data.skills[q.skill].total++;
    if (ok) data.skills[q.skill].correct++;

    if (!ok) {
      var m = {
        prompt: q.prompt,
        choices: q.choices.slice(0),
        answer: q.answer,
        skill: q.skill,
        label: q.label,
        explain: q.explain,
        time: new Date().toISOString()
      };
      data.mistakes.unshift(m);
      data.mistakes = uniqueMistakes(data.mistakes).slice(0, 20);
    } else {
      // 同じ問題を正解したら、にがてリストから少し消す
      for (var i = data.mistakes.length - 1; i >= 0; i--) {
        if (data.mistakes[i].prompt === q.prompt && data.mistakes[i].answer === q.answer) {
          data.mistakes.splice(i, 1);
          break;
        }
      }
    }
    saveData();
  }

  function uniqueMistakes(list) {
    var seen = {};
    var out = [];
    for (var i = 0; i < list.length; i++) {
      var key = list[i].prompt + "|" + list[i].answer;
      if (!seen[key]) {
        seen[key] = true;
        out.push(list[i]);
      }
    }
    return out;
  }

  function makeQuestionForMode(mode) {
    // 通常モードでも25%だけ「にがて」を戻す。これがフィードバックループ。
    if (mode !== "weak" && data.mistakes.length > 0 && Math.random() < 0.25) {
      return questionFromMistake();
    }
    if (mode === "weak") {
      if (data.mistakes.length > 0 && Math.random() < 0.75) return questionFromMistake();
      return makeEasyQuestion();
    }
    if (mode === "math") return makeMathQuestion();
    if (mode === "jp") return makeJapaneseQuestion();
    return Math.random() < 0.5 ? makeMathQuestion() : makeJapaneseQuestion();
  }

  function questionFromMistake() {
    var m = data.mistakes[Math.floor(Math.random() * data.mistakes.length)];
    var choices = shuffle(m.choices.slice(0));
    return {
      prompt: m.prompt,
      choices: choices,
      answer: m.answer,
      skill: m.skill,
      label: "にがて ふくしゅう",
      explain: m.explain || "もういちど やってみよう。"
    };
  }

  function makeEasyQuestion() {
    if (Math.random() < 0.5) {
      var a = rand(2, 7);
      var b = rand(1, 6);
      var ans = a + b;
      return buildQuestion("さんすう", "math_add", a + " + " + b + " = ？", ans, "あわせると " + ans + " だね。");
    }
    return makeJapaneseQuestion();
  }

  function makeMathQuestion() {
    var r = Math.random();
    if (r < 0.35) return makeAddQuestion();
    if (r < 0.65) return makeSubQuestion();
    if (r < 0.82) return makeNumberSenseQuestion();
    return makeWordMathQuestion();
  }

  function makeAddQuestion() {
    var max = skillStrong("math_add") ? 10 : 8;
    var a = rand(1, max);
    var b = rand(1, max);
    if (a + b > 20) b = 20 - a;
    if (b < 1) b = 1;
    var ans = a + b;
    return buildQuestion("さんすう", "math_add", a + " + " + b + " = ？", ans, a + " と " + b + " を あわせると " + ans + "。");
  }

  function makeSubQuestion() {
    var max = skillStrong("math_sub") ? 20 : 15;
    var a = rand(5, max);
    var b = rand(1, a - 1);
    var ans = a - b;
    return buildQuestion("さんすう", "math_sub", a + " - " + b + " = ？", ans, a + " から " + b + " を とると " + ans + "。");
  }

  function makeNumberSenseQuestion() {
    var a = rand(1, 30);
    var b = rand(1, 30);
    while (b === a) b = rand(1, 30);
    var bigger = Math.max(a, b);
    var smaller = Math.min(a, b);
    if (Math.random() < 0.5) {
      return {
        label: "かず",
        skill: "number_sense",
        prompt: "おおきい かずは どっち？",
        choices: shuffle([String(a), String(b)]),
        answer: String(bigger),
        explain: bigger + " のほうが おおきいね。"
      };
    }
    return {
      label: "かず",
      skill: "number_sense",
      prompt: "ちいさい かずは どっち？",
      choices: shuffle([String(a), String(b)]),
      answer: String(smaller),
      explain: smaller + " のほうが ちいさいね。"
    };
  }

  function makeWordMathQuestion() {
    var a = rand(4, 12);
    var b = rand(2, 7);
    if (Math.random() < 0.5) {
      var ans = a + b;
      return buildQuestion("ぶんしょうだい", "math_add", "ブロックが " + a + "こ。さらに " + b + "こ。ぜんぶで？", ans, "ぜんぶで " + ans + "こ だね。");
    } else {
      if (b >= a) b = a - 1;
      var ans2 = a - b;
      return buildQuestion("ぶんしょうだい", "math_sub", "ねじが " + a + "こ。" + b + "こ つかった。のこりは？", ans2, "のこりは " + ans2 + "こ だね。");
    }
  }

  function makeJapaneseQuestion() {
    var r = Math.random();
    if (r < 0.34) return makeKanaQuestion();
    if (r < 0.67) return makeVocabQuestion();
    return makeReadingQuestion();
  }

  function makeKanaQuestion() {
    var words = [
      ["ねこ", "ね", "こ"], ["いぬ", "い", "ぬ"], ["さくら", "さ", "ら"], ["りんご", "り", "ご"],
      ["くるま", "く", "ま"], ["ほし", "ほ", "し"], ["はな", "は", "な"], ["うさぎ", "う", "ぎ"],
      ["みかん", "み", "ん"], ["けーき", "け", "き"], ["こうじ", "こ", "じ"], ["てっきゅう", "て", "う"],
      ["くれーん", "く", "ん"], ["とんかち", "と", "ち"]
    ];
    var item = words[rand(0, words.length - 1)];
    var askLast = Math.random() < 0.45;
    var answer = askLast ? item[2] : item[1];
    var all = ["あ","い","う","え","お","か","き","く","け","こ","さ","し","す","せ","そ","た","ち","て","と","ね","ぬ","り","は","ほ","ま","み","ん","じ","ご"];
    var choices = [answer];
    while (choices.length < 4) {
      var c = all[rand(0, all.length - 1)];
      if (choices.indexOf(c) < 0) choices.push(c);
    }
    return {
      label: "ひらがな",
      skill: "kana",
      prompt: "「" + item[0] + "」の " + (askLast ? "さいご" : "はじめ") + "の もじは？",
      choices: shuffle(choices),
      answer: answer,
      explain: "「" + item[0] + "」の " + (askLast ? "さいご" : "はじめ") + "は「" + answer + "」だね。"
    };
  }

  function makeVocabQuestion() {
    var sets = [
      { prompt: "「ねこ」と おなじ なかまは？", answer: "いぬ", choices: ["いぬ", "くるま", "けーき", "ぼうし"], explain: "ねこも いぬも どうぶつだね。" },
      { prompt: "「りんご」と おなじ なかまは？", answer: "みかん", choices: ["みかん", "つくえ", "くつ", "えんぴつ"], explain: "りんごも みかんも くだものだね。" },
      { prompt: "「あか」と おなじ なかまは？", answer: "あお", choices: ["あお", "ねこ", "ごはん", "はしる"], explain: "あかも あおも いろだね。" },
      { prompt: "「はしる」と おなじ なかまは？", answer: "とぶ", choices: ["とぶ", "りぼん", "さかな", "みどり"], explain: "はしるも とぶも うごきだね。" },
      { prompt: "「おはな」は どこに さく？", answer: "にわ", choices: ["にわ", "そら", "うみ", "れいぞうこ"], explain: "おはなは にわや はたけに さくね。" },
      { prompt: "「くれーん」と おなじ なかまは？", answer: "だんぷ", choices: ["だんぷ", "いちご", "くつ", "えほん"], explain: "くれーんも だんぷも はたらく くるまだね。" },
      { prompt: "「ながい」の はんたいは？", answer: "みじかい", choices: ["みじかい", "あかい", "おもい", "はやい"], explain: "ながいの はんたいは みじかい だね。" },
      { prompt: "「うえ」の はんたいは？", answer: "した", choices: ["した", "みぎ", "そと", "まえ"], explain: "うえの はんたいは した だね。" }
    ];
    var s = sets[rand(0, sets.length - 1)];
    return {
      label: "ことば",
      skill: "vocab",
      prompt: s.prompt,
      choices: shuffle(s.choices.slice(0)),
      answer: s.answer,
      explain: s.explain
    };
  }

  function makeReadingQuestion() {
    var qs = [
      { prompt: "「ねこが ねています。」ねこは なにを してる？", answer: "ねてる", choices: ["ねてる", "とんでる", "ないてる"], explain: "ねこは ねているね。" },
      { prompt: "「あめが ふっています。」ふっているのは？", answer: "あめ", choices: ["あめ", "ゆき", "はな"], explain: "ふっているのは あめだね。" },
      { prompt: "「げんは えを かきます。」げんは なにを かく？", answer: "え", choices: ["え", "ごはん", "くつ"], explain: "げんは えを かくね。" },
      { prompt: "「うさぎが にんじんを たべます。」たべるものは？", answer: "にんじん", choices: ["にんじん", "さかな", "ぼうし"], explain: "うさぎは にんじんを たべるね。" },
      { prompt: "「ほしが きらきら ひかります。」ひかるのは？", answer: "ほし", choices: ["ほし", "ねこ", "りんご"], explain: "ほしが ひかるね。" },
      { prompt: "「くれーんが おおきな いしを はこびます。」はこぶものは？", answer: "いし", choices: ["いし", "みず", "はな", "くつ"], explain: "くれーんは いしを はこぶね。" },
      { prompt: "「あかい ヘルメットを かぶります。」かぶるものは？", answer: "ヘルメット", choices: ["ヘルメット", "ながぐつ", "てぶくろ", "くるま"], explain: "かぶるものは ヘルメットだね。" },
      { prompt: "「ダンプが すなを はこびました。」なにを はこんだ？", answer: "すな", choices: ["すな", "あめ", "ほん", "りんご"], explain: "ダンプは すなを はこんだね。" }
    ];
    var q = qs[rand(0, qs.length - 1)];
    return {
      label: "文のりかい",
      skill: "reading",
      prompt: q.prompt,
      choices: shuffle(q.choices.slice(0)),
      answer: q.answer,
      explain: q.explain
    };
  }

  function buildQuestion(label, skill, prompt, numericAnswer, explain) {
    var ans = String(numericAnswer);
    var choices = [ans];
    var delta = [-2, -1, 1, 2, 3, -3];
    for (var i = 0; i < delta.length && choices.length < 4; i++) {
      var v = numericAnswer + delta[i];
      if (v >= 0 && choices.indexOf(String(v)) < 0) choices.push(String(v));
    }
    while (choices.length < 4) {
      var r = rand(0, Math.max(20, numericAnswer + 6));
      if (choices.indexOf(String(r)) < 0) choices.push(String(r));
    }
    return {
      label: label,
      skill: skill,
      prompt: prompt,
      choices: shuffle(choices),
      answer: ans,
      explain: explain
    };
  }

  function skillStrong(skill) {
    var s = data.skills[skill];
    if (!s || s.total < 8) return false;
    return (s.correct / s.total) >= 0.8;
  }

  function renderStats() {
    $("statSessions").textContent = data.sessions;
    var acc = data.total ? Math.round((data.correct / data.total) * 100) : 0;
    $("statAccuracy").textContent = acc + "%";
    $("statTime").textContent = Math.round(data.totalSeconds / 60) + "分";

    var list = $("skillList");
    list.innerHTML = "";
    var any = false;
    for (var key in skillNames) {
      if (!skillNames.hasOwnProperty(key)) continue;
      var s = data.skills[key] || { total: 0, correct: 0 };
      var rate = s.total ? Math.round((s.correct / s.total) * 100) : 0;
      var row = document.createElement("div");
      row.className = "skill-row";
      row.innerHTML = '<div class="skill-top"><span>' + skillNames[key] + '</span><span>' + s.correct + '/' + s.total + '　' + rate + '%</span></div><div class="bar"><div class="bar-fill" style="width:' + rate + '%"></div></div>';
      list.appendChild(row);
      any = true;
    }
    if (!any) list.textContent = "まだ記録がありません。";

    var ml = $("mistakeList");
    ml.innerHTML = "";
    if (data.mistakes.length === 0) {
      var li = document.createElement("li");
      li.textContent = "今のところ、にがて記録はありません。";
      ml.appendChild(li);
    } else {
      var max = Math.min(8, data.mistakes.length);
      for (var i = 0; i < max; i++) {
        var m = data.mistakes[i];
        var li2 = document.createElement("li");
        li2.textContent = "【" + (skillNames[m.skill] || m.label) + "】" + m.prompt + " → 答え：" + m.answer;
        ml.appendChild(li2);
      }
    }
  }

  function praiseText() {
    var arr = [
      "すごい！",
      "いいね！",
      "よくみてる！",
      "さすが！",
      "はなまる！",
      "そのちょうし！",
      "きれいに ぬれたね！"
    ];
    return arr[rand(0, arr.length - 1)];
  }

  function sparkle() {
    var marks = ["🚧","🏗️","💥","🔩","⭐"];
    for (var i = 0; i < 8; i++) {
      var sp = document.createElement("div");
      sp.className = "sparkle";
      sp.textContent = marks[rand(0, marks.length - 1)];
      sp.style.left = rand(12, 88) + "vw";
      sp.style.top = rand(24, 80) + "vh";
      sp.style.animationDelay = (i * 45) + "ms";
      document.body.appendChild(sp);
      (function(node) {
        setTimeout(function(){ if (node.parentNode) node.parentNode.removeChild(node); }, 1100);
      })(sp);
    }
  }

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i];
      arr[i] = arr[j];
      arr[j] = t;
    }
    return arr;
  }

  function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function init() {
    renderHomeArt();
    renderThemeGrid();

    bindTap($("homeBtn"), function() {
      showScreen("homeScreen");
    });
    bindTap($("startBtn"), function() {
      renderThemeGrid();
      showScreen("setupScreen");
    });
    bindTap($("weakBtn"), function() {
      startSession("weak");
    });
    bindTap($("statsBtn"), function() {
      renderStats();
      showScreen("statsScreen");
    });
    bindTap($("nextBtn"), function() {
      if (session && session.correctParts >= session.targetParts) {
        finishSession();
      } else {
        nextQuestion();
      }
    });
    bindTap($("againBtn"), function() {
      renderThemeGrid();
      showScreen("setupScreen");
    });
    bindTap($("finishStatsBtn"), function() {
      renderStats();
      showScreen("statsScreen");
    });
    bindTap($("backHomeBtn"), function() {
      showScreen("homeScreen");
    });
    bindTap($("resetBtn"), function() {
      if (confirm("記録をリセットしますか？")) {
        try { localStorage.removeItem(STORE_KEY); } catch(e) {}
        data = loadData();
        renderStats();
      }
    });

    var modeBtns = document.querySelectorAll(".modeBtn");
    for (var i = 0; i < modeBtns.length; i++) {
      bindTap(modeBtns[i], function(e) {
        startSession(e.currentTarget.getAttribute("data-mode"));
      });
    }

  }

  init();
